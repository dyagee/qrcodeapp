name: qrcodeapp
description: A beautiful QR Code Scanner & Generator app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  path_provider: ^2.1.2
  gal: ^2.3.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
